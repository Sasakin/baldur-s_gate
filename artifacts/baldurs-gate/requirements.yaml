packages:
  "framer-motion": "For cinematic UI animations, transitions, and menu effects"
  "clsx": "For conditional class merging"
  "tailwind-merge": "For merging tailwind classes safely"

images:
  - path: "artifacts/baldurs-gate/public/images/main-menu-bg.png"
    description: "Dark medieval fantasy castle at night with glowing red windows and thick mist, cinematic lighting, gothic RPG background"
    aspect_ratio: "16:9"
  - path: "artifacts/baldurs-gate/public/images/parchment.png"
    description: "Old ancient rough parchment paper texture, worn edges, dark stains, blank"
    aspect_ratio: "1:1"
  - path: "artifacts/baldurs-gate/public/images/combat-bg.png"
    description: "Dark creepy dungeon interior, stone walls, atmospheric lighting, battle arena background"
    aspect_ratio: "16:9"

notes:
  - The game is a single-page React app using canvas for the isometric view and React for UI.
  - Using framer-motion for UI polish to give it a premium RPG feel.
  - The API hooks useSaveGame and useLoadGame are imported from @workspace/api-client-react.
